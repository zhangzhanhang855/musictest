<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID DJ-SYSTEM | MK-7</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <!-- 引入硬核科技感字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --panel-bg: #121212;
            --metal-finish: linear-gradient(145deg, #1e1e1e, #111);
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --lcd-bg: #0a110a;
            --carbon: repeating-linear-gradient(45deg, #111 0px, #111 2px, #1a1a1a 2px, #1a1a1a 4px);
        }

        body {
            background-color: #080808;
            color: #e0e0e0;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: var(--carbon);
        }

        /* --- DJ 整体面板 --- */
        .dj-console {
            width: 98vw;
            max-width: 1300px;
            height: 850px;
            background: #1a1a1a;
            border: 4px solid #2a2a2a;
            border-radius: 20px;
            display: flex;
            padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px rgba(255,255,255,0.05);
            position: relative;
        }

        /* --- 左侧：打碟机 Deck --- */
        .deck-section {
            flex: 2;
            background: var(--metal-finish);
            border-radius: 15px;
            border: 2px solid #000;
            margin-right: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        /* 机械慢轮 Jog Wheel */
        .jog-wheel {
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: conic-gradient(#111 0%, #222 5%, #111 10%, #222 15%, #111 20%);
            border: 12px solid #000;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            cursor: pointer;
            transition: transform 0.1s linear;
        }

        .jog-wheel::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 1px solid rgba(255,242,0,0.1); /* 频闪刻度 */
            background: repeating-conic-gradient(from 0deg, transparent 0deg 2deg, #000 2deg 4deg);
        }

        .jog-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; height: 140px;
            background: #000;
            border-radius: 50%;
            border: 4px solid var(--neon-blue);
            display: flex; align-items: center; justify-content: center;
            z-index: 5;
            background-size: cover;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* 旋转动画 */
        .is-playing .jog-wheel {
            animation: rotate-jog 4s linear infinite;
        }

        @keyframes rotate-jog {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* LCD 显示屏 */
        .lcd-screen {
            width: 100%;
            background: var(--lcd-bg);
            border: 3px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
            font-family: 'Share Tech Mono', monospace;
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            box-shadow: inset 0 0 10px #000;
        }

        /* --- 按钮与推子 --- */
        .fader-group {
            position: absolute;
            right: 40px; top: 150px;
            height: 300px; width: 40px;
            background: #000; border-radius: 5px;
        }
        .fader-knob {
            width: 50px; height: 20px;
            background: #444; border: 2px solid #666;
            position: absolute; left: -5px; bottom: 50%;
            border-radius: 3px; cursor: ns-resize;
        }

        .pad-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 40px;
        }
        .pad {
            width: 65px; height: 50px;
            background: #222;
            border-radius: 4px;
            border-bottom: 3px solid #000;
            cursor: pointer;
            transition: 0.1s;
        }
        .pad.active { background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); transform: translateY(2px); }

        /* --- 右侧：曲库 Crate --- */
        .crate-section {
            flex: 1.2;
            background: #151515;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }

        .track-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 20px;
        }
        .track-item {
            padding: 12px 15px;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.03);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .track-item:hover { background: rgba(255,255,255,0.1); }
        .track-item.active {
            border-left-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.1);
            color: var(--neon-blue);
        }

        /* 登录遮罩 */
        .auth-mask {
            position: fixed; inset: 0; z-index: 1000;
            background: #000; display: flex; align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .power-btn {
            width: 120px; height: 120px;
            border-radius: 50%; border: 4px solid #333;
            color: #333; font-size: 40px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .power-btn:hover { color: var(--neon-red); border-color: #ff3131; text-shadow: 0 0 20px #ff3131; }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="is-paused">

    <!-- 启动电源键 -->
    <div id="login-screen" class="auth-mask">
        <div class="text-center">
            <div class="power-btn" onclick="bootSystem()">
                <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <p class="mt-6 tracking-[0.5em] text-xs opacity-30">SYSTEM STANDBY</p>
            <input type="password" id="pwd-input" placeholder="PASSCODE" class="mt-8 bg-transparent border-b border-white/10 text-center outline-none p-2 tracking-widest hidden">
        </div>
    </div>

    <!-- DJ 核心台面 -->
    <div id="main-app" class="dj-console opacity-0 transition-opacity duration-1000">
        
        <!-- Deck A -->
        <section class="deck-section">
            <div class="lcd-screen">
                <div class="flex justify-between text-[10px] mb-1">
                    <span>DECK A | MASTER</span>
                    <span id="track-type">24BIT / 48kHz</span>
                </div>
                <div class="text-xl truncate" id="title">WAITING FOR LOAD...</div>
                <div class="text-[10px] opacity-60 uppercase" id="artist-name">ENGINE v2.5</div>
                <div class="mt-4 flex justify-between font-bold text-lg">
                    <span id="cur-time">00:00:00</span>
                    <span id="dur-time">00:00:00</span>
                </div>
            </div>

            <div class="artwork-area relative">
                <div id="cover-wheel" class="jog-wheel" onclick="playToggle()">
                    <div id="jog-center" class="jog-center">
                        <span id="cover-emoji" class="text-4xl">💿</span>
                    </div>
                </div>
                
                <!-- 速度调节推子 -->
                <div class="fader-group">
                    <div class="fader-knob" id="pitch-fader"></div>
                </div>
            </div>

            <!-- 打击垫功能区 -->
            <div class="pad-grid">
                <div class="pad active" onclick="step(-1)"></div>
                <div class="pad" onclick="setLoop()"></div>
                <div class="pad" onclick="dl()"></div>
                <div class="pad active" onclick="step(1)"></div>
            </div>

            <!-- 底部控制 -->
            <div class="mt-10 flex gap-8">
                <button onclick="playToggle()" class="w-20 h-20 bg-black border-2 border-white/20 rounded-full flex items-center justify-center hover:border-white transition-all">
                    <div id="play-icon" class="w-0 h-0 border-y-[12px] border-y-transparent border-l-[20px] border-l-white ml-2"></div>
                </button>
                <div class="flex flex-col justify-center">
                    <div class="text-[9px] mb-1 opacity-40">CUE POINT</div>
                    <div class="w-12 h-6 bg-orange-600 rounded"></div>
                </div>
            </div>
        </section>

        <!-- 曲库与列表 -->
        <aside class="crate-section">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xs tracking-widest text-white/50">TRACK CRATE</h2>
                <div id="folder-tag" class="text-[9px] bg-white/10 px-2 py-1 rounded">ROOT</div>
            </div>

            <div id="playlist-nav" class="flex gap-2 mt-4 overflow-x-auto no-scrollbar py-2"></div>

            <div class="mt-4">
                <input type="text" id="q" oninput="doSearch()" placeholder="FILTER TRACKS..." class="w-full bg-black/40 border border-white/5 py-2 px-4 text-[10px] outline-none focus:border-cyan-500">
            </div>

            <ul id="list" class="track-list no-scrollbar"></ul>

            <div class="pt-4 mt-auto">
                <p id="ai-text" class="text-[10px] text-cyan-500/60 font-mono italic">SYSTEM ONLINE...</p>
            </div>
        </aside>

    </div>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const G = { user: 'zhangzhanhang855', repo: 'musiconly', ver: 'main' };
        let playlists = {}; 
        let currentPlaylistName = "";
        let filtered = [], curIdx = 0, isPlaying = false;
        
        const audio = document.getElementById('player');
        const mainApp = document.getElementById('main-app');

        // 启动系统
        function bootSystem() {
            // 这里可以加密码判断，直接进入则去掉判断
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                mainApp.style.opacity = '1';
                init();
            }, 800);
        }

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                const items = await res.json();
                
                // 扫描音乐
                const rootSongs = filterSongs(items);
                if (rootSongs.length > 0) playlists["Root"] = rootSongs;

                const folders = items.filter(i => i.type === "dir");
                for (const f of folders) {
                    const sub = await (await fetch(f.url)).json();
                    const songs = filterSongs(sub);
                    if (songs.length > 0) playlists[f.name] = songs;
                }

                renderNav();
                switchPlaylist(Object.keys(playlists)[0]);
            } catch (e) {
                document.getElementById('title').innerText = "CONNECTION ERROR";
            }
        }

        function filterSongs(items) {
            return items.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => ({
                t: f.name.replace(/\.[^/.]+$/, ""),
                u: f.download_url,
                type: f.size > 15000000 ? 'HI-RES' : 'PCM'
            }));
        }

        function renderNav() {
            const nav = document.getElementById('playlist-nav');
            nav.innerHTML = Object.keys(playlists).map(name => `
                <button onclick="switchPlaylist('${name}')" class="text-[9px] px-3 py-1 bg-white/5 whitespace-nowrap hover:bg-white/20">
                    ${name.toUpperCase()}
                </button>
            `).join('');
        }

        function switchPlaylist(name) {
            currentPlaylistName = name;
            filtered = [...playlists[name]];
            document.getElementById('folder-tag').innerText = name.toUpperCase();
            renderList();
            executeLoad(0, false);
        }

        function renderList() {
            const listEl = document.getElementById('list');
            listEl.innerHTML = filtered.map((s, i) => `
                <li class="track-item ${curIdx === i ? 'active' : ''}" onclick="executeLoad(${i}, true)">
                    ${String(i+1).padStart(2,'0')} | ${s.t}
                </li>
            `).join('');
        }

        function executeLoad(idx, auto) {
            curIdx = idx;
            const song = filtered[curIdx];
            audio.src = song.u;
            document.getElementById('title').innerText = song.t;
            document.getElementById('track-type').innerText = song.type;
            
            // 封面处理
            const center = document.getElementById('jog-center');
            center.style.backgroundImage = 'none';
            document.getElementById('cover-emoji').style.display = 'block';

            new jsmediatags.Reader(song.u).read({
                onSuccess: (tag) => {
                    const p = tag.tags.picture;
                    if (p) {
                        let b64 = "";
                        for (let i = 0; i < p.data.length; i++) b64 += String.fromCharCode(p.data[i]);
                        center.style.backgroundImage = `url(data:${p.format};base64,${window.btoa(b64)})`;
                        document.getElementById('cover-emoji').style.display = 'none';
                    }
                }
            });

            renderList();
            if (auto) audio.play();
        }

        function playToggle() {
            audio.paused ? audio.play() : audio.pause();
        }

        audio.onplay = () => {
            document.body.classList.replace('is-paused', 'is-playing');
            document.getElementById('play-icon').style.borderLeftColor = "#39ff14";
            document.getElementById('ai-text').innerText = "TRACK ANALYZED | DECK RUNNING";
        };

        audio.onpause = () => {
            document.body.classList.replace('is-playing', 'is-paused');
            document.getElementById('play-icon').style.borderLeftColor = "#fff";
        };

        audio.ontimeupdate = () => {
            document.getElementById('cur-time').innerText = fmt(audio.currentTime);
            document.getElementById('dur-time').innerText = fmt(audio.duration);
            // 模拟推子随机微动
            if(isPlaying) document.getElementById('pitch-fader').style.bottom = (50 + Math.random()*2) + '%';
        };

        function fmt(s) {
            if (isNaN(s)) return "00:00:00";
            let m = Math.floor(s/60), sec = Math.floor(s%60), ms = Math.floor((s%1)*100);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}:${ms.toString().padStart(2,'0')}`;
        }

        function step(d) {
            executeLoad((curIdx + d + filtered.length) % filtered.length, true);
        }

        function doSearch() {
            const val = document.getElementById('q').value.toLowerCase();
            filtered = playlists[currentPlaylistName].filter(s => s.t.toLowerCase().includes(val));
            renderList();
        }

        function dl() { window.open(filtered[curIdx].u); }
        function setLoop() { alert("LOOP MODE: AUTO-SYNC"); }
        function addMusic() { window.location.href = `mailto:zhangzhanhang855@gmail.com`; }
    </script>
</body>
</html>
